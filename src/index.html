<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<script>
			(function () {
				function applyTheme(theme) {
					document.documentElement.setAttribute('data-theme', theme);
				}

				function getInitialTheme() {
					try {
						const storedTheme =
							window.localStorage.getItem('@gatuno/theme');
						if (storedTheme === 'dark' || storedTheme === 'light')
							return storedTheme;
					} catch (e) {
						console.error('Erro ao acessar localStorage:', e);
					}

					try {
						if (
							window.matchMedia('(prefers-color-scheme: dark)')
								.matches
						) {
							return 'dark';
						}
					} catch (e) {
						console.error('Erro ao acessar matchMedia:', e);
					}

					return 'light';
				}

				applyTheme(getInitialTheme());
			})();
		</script>

		<meta charset="utf-8" />
		<title>Front</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/x-icon" href="favicon.ico" />
		<link rel="manifest" href="manifest.webmanifest" />

		<!-- Fonts & Connection Optimization -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preconnect" href="http://localhost:3000" />
		<link rel="preconnect" href="http://localhost:3001" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&family=Epilogue:wght@700&family=Manrope:wght@400;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<app-root></app-root>
		<noscript
			>Please enable JavaScript to continue using this
			application.</noscript
		>
	</body>
</html>
